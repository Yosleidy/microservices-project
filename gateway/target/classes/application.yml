spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://user-service:8081
          predicates:
            - Path=/users/**
        - id: order-service
          uri: http://order-service:8082
          predicates:
            - Path=/orders/**
        - id: product-service
          uri: http://product-service:8083
          predicates:
            - Path=/products/**


server:
  port: 8080
  address: 0.0.0.0